  文章页统一模板 - 基于主页设计系统
  子代理使用此模板生成文章页面
  替换标记: {{TITLE}}, {{DESCRIPTION}}, {{BREADCRUMB_CAT}}, {{H1}}, {{SUBTITLE}}, {{DATE}}, {{READ_TIME}}, {{TAG_CLASS}}, {{TAG_TEXT}}, {{TOC_HTML}}, {{ARTICLE_HTML}}, {{SERIES_NAV_HTML}}
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>{{TITLE}} - Allen's Tech</title>
<meta name="description" content="{{DESCRIPTION}}">
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#ffffff;--bg-card:#f8f9fa;--bg-card-hover:#ffffff;
  --text:#1a1a2e;--text-secondary:#6b7280;--text-muted:#9ca3af;
  --border:#e5e7eb;--border-hover:#d1d5db;
  --nav-bg:rgba(255,255,255,0.85);
  --primary:#1a1a2e;
  --accent-green:#22c55e;--accent-orange:#f97316;--accent-blue:#3b82f6;--accent-purple:#8b5cf6;--accent-red:#ef4444;--accent-pink:#ec4899;--accent-cyan:#06b6d4;
  --shadow:0 1px 3px rgba(0,0,0,0.06);
  --shadow-hover:0 12px 32px rgba(0,0,0,0.1);
  --shadow-card:0 2px 8px rgba(0,0,0,0.04);
  --radius:16px;
  --grid-color:transparent;
  --code-bg:#f6f8fa;--code-text:#1a1a2e;--code-border:#e5e7eb
}

[data-theme="dark"]{
  --bg:#0a0a14;--bg-card:#141425;--bg-card-hover:#1a1a30;
  --text:#e5e7eb;--text-secondary:#9ca3af;--text-muted:#6b7280;
  --border:#1e1e36;--border-hover:#2d2d4a;
  --nav-bg:rgba(10,10,20,0.88);
  --shadow:0 1px 3px rgba(0,0,0,0.4);
  --shadow-hover:0 12px 32px rgba(0,0,0,0.5);
  --shadow-card:0 2px 8px rgba(0,0,0,0.2);
  --grid-color:rgba(255,255,255,0.02);
  --code-bg:#1e1e2e;--code-text:#cdd6f4;--code-border:#2d2d4a
}

html{scroll-behavior:smooth;overflow-x:hidden}

body{overflow-x:hidden;
  font-family:'Inter','Noto Sans SC',system-ui,-apple-system,sans-serif;
  background:var(--bg);color:var(--text);line-height:1.6;
  transition:background .3s,color .3s;min-height:100vh;overflow-x:hidden
}

[data-theme="dark"] body::before{
  content:'';position:fixed;inset:0;z-index:-1;
  background-image:
    linear-gradient(var(--grid-color) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
  background-size:60px 60px;
  mask-image:radial-gradient(ellipse 80% 70% at 50% 30%, black, transparent);
  -webkit-mask-image:radial-gradient(ellipse 80% 70% at 50% 30%, black, transparent)
}

/* ─── Nav (same as homepage) ─── */
nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  background:var(--nav-bg);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);transition:background .3s,border .3s
}
.nav-inner{
  max-width:1100px;margin:0 auto;padding:0 24px;height:64px;
  display:flex;align-items:center;justify-content:space-between
}
.nav-logo{
  font-size:1.25rem;font-weight:800;color:var(--primary);
  text-decoration:none;letter-spacing:-0.5px
}
[data-theme="dark"] .nav-logo{color:var(--accent-green)}
.nav-links{display:flex;align-items:center;gap:28px}
.nav-links a{
  text-decoration:none;color:var(--text-secondary);font-size:.9rem;font-weight:500;
  transition:color .2s;padding:4px 0
}
.nav-links a:hover,.nav-links a.active{color:var(--text)}
.nav-links a.active{position:relative}
.nav-links a.active::after{
  content:'';position:absolute;bottom:-2px;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--accent-green),var(--accent-orange));border-radius:1px
}
.nav-links a.disabled{opacity:0.4;cursor:default;pointer-events:auto}
.nav-links a.disabled:hover{background:transparent;color:var(--text-secondary);opacity:0.4}
.theme-btn{
  background:none;border:1px solid var(--border);border-radius:10px;
  width:40px;height:40px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:1.1rem;transition:all .2s;color:var(--text)
}
.theme-btn:hover{border-color:var(--text-secondary);background:var(--bg-card)}

.hamburger{
  display:none;background:none;border:1px solid var(--border);border-radius:10px;
  width:44px;height:44px;cursor:pointer;flex-direction:column;align-items:center;
  justify-content:center;gap:5px;transition:all .2s
}
.hamburger span{
  display:block;width:20px;height:2px;background:var(--text);border-radius:2px;
  transition:all .3s
}
.hamburger.active span:nth-child(1){transform:rotate(45deg) translate(5px,5px)}
.hamburger.active span:nth-child(2){opacity:0}
.hamburger.active span:nth-child(3){transform:rotate(-45deg) translate(5px,-5px)}

.mobile-menu{
  display:none;position:fixed;top:64px;left:0;right:0;bottom:0;
  background:var(--bg);
  padding:16px 24px 40px;
  flex-direction:column;gap:4px;overflow-y:auto;z-index:1000
}
.mobile-menu.show{display:flex !important}
.mobile-menu a{
  display:flex;align-items:center;text-decoration:none;color:var(--text-secondary);
  font-size:1.1rem;font-weight:500;padding:16px 20px;border-radius:12px;
  transition:all .2s;min-height:48px;border-bottom:1px solid var(--border)
}
.mobile-menu a:last-child{border-bottom:none}
.mobile-menu a:hover,.mobile-menu a.active{color:var(--text);background:var(--bg-card)}
.mobile-menu a.disabled{opacity:0.4;cursor:default}
.mobile-menu a.disabled:hover{background:transparent;color:var(--text-secondary);opacity:0.4}

/* ─── Article Layout ─── */
.article-layout{position:relative;
  max-width:1100px;margin:0 auto;padding:88px 24px 60px;
  display:block;max-width:1100px;margin:0 auto;padding:88px 24px 60px 260px
}

/* ─── TOC Sidebar ─── */
.toc{position:fixed;top:64px;left:0;width:220px;height:calc(100vh - 64px);padding:24px 12px 24px 24px;border-right:1px solid var(--border);background:var(--bg);z-index:10}
.toc-inner{height:100%;overflow-y:auto;padding-right:8px}
.toc h4{font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);margin-bottom:12px}
.toc ul{list-style:none;padding:0}
.toc li{margin-bottom:2px}
.toc a{
  display:block;padding:5px 12px;font-size:.8rem;color:var(--text-secondary);
  text-decoration:none;border-left:2px solid transparent;transition:all .2s;line-height:1.5
}
.toc a:hover{color:var(--text);border-left-color:var(--border)}
.toc a.active{color:var(--accent-green);border-left-color:var(--accent-green);font-weight:500}
.toc .t2{padding-left:24px;font-size:.76rem}

/* ─── Article ─── */
.article{max-width:740px;min-width:0;overflow:hidden;margin-left:auto;margin-right:auto;overflow-wrap:break-word;word-wrap:break-word}

/* Meta header */
.article-meta{margin-bottom:36px;padding-bottom:28px;border-bottom:1px solid var(--border)}
.breadcrumb{font-size:.82rem;color:var(--text-muted);margin-bottom:16px}
.breadcrumb a{color:var(--text-secondary);text-decoration:none}
.breadcrumb a:hover{color:var(--accent-green)}
.article-meta h1{word-break:break-word;font-size:2rem;font-weight:800;letter-spacing:-.5px;line-height:1.3;margin-bottom:12px}
.article-meta .subtitle{word-break:break-word;font-size:1.05rem;color:var(--text-secondary);margin-bottom:16px;line-height:1.6}
.article-meta .info{display:flex;align-items:center;gap:16px;font-size:.82rem;color:var(--text-muted);flex-wrap:wrap}
.tag{display:inline-block;font-size:.7rem;font-weight:700;padding:3px 10px;border-radius:8px}
.tag-ai{background:rgba(34,197,94,0.1);color:var(--accent-green)}
.tag-agent{background:rgba(59,130,246,0.1);color:var(--accent-blue)}
.tag-product{background:rgba(249,115,22,0.1);color:var(--accent-orange)}
.tag-thinking{background:rgba(236,72,153,0.1);color:var(--accent-pink)}
.tag-tech{background:rgba(6,182,212,0.1);color:var(--accent-cyan)}
.tag-mcp{background:rgba(139,92,246,0.1);color:var(--accent-purple)}

/* Content typography */
.content h2{
  font-size:1.5rem;font-weight:700;margin:48px 0 16px;padding-top:24px;
  border-top:1px solid var(--border);letter-spacing:-.3px
}
.content h2:first-of-type{border-top:none;margin-top:0;padding-top:0}
.content h3{font-size:1.15rem;font-weight:600;margin:32px 0 12px}
.content p{overflow-wrap:break-word;margin-bottom:16px;line-height:1.9}
.content a{color:var(--accent-green);text-decoration:none;font-weight:500}
.content a:hover{text-decoration:underline}
.content ul,.content ol{margin:0 0 16px 20px}
.content li{margin-bottom:6px;line-height:1.8}
.content strong{font-weight:600}
.content blockquote{
  margin:20px 0;padding:16px 20px;border-left:3px solid var(--accent-green);
  background:var(--bg-card);border-radius:0 8px 8px 0;font-size:.95rem
}
.content blockquote p{margin-bottom:0;color:var(--text-secondary)}
.content hr{border:none;border-top:1px solid var(--border);margin:40px 0}
.content img{max-width:100%;border-radius:8px;margin:16px 0}

/* Code blocks */
.content code{
  font-family:'JetBrains Mono',monospace;font-size:.85em;
  background:var(--code-bg);color:var(--code-text);
  padding:2px 6px;border-radius:4px;border:1px solid var(--code-border)
}
.content pre{
  margin:20px 0;padding:20px 24px;border-radius:12px;overflow-x:auto;
  background:var(--code-bg);border:1px solid var(--code-border);
  font-size:.85rem;line-height:1.7
}
.content pre code{background:none;border:none;padding:0;font-size:inherit}

/* Callout boxes */
.callout{
  margin:24px 0;padding:20px 24px;border-radius:12px;border:1px solid;
  font-size:.92rem;line-height:1.8
}
.callout-info{background:rgba(59,130,246,.06);border-color:rgba(59,130,246,.2)}
.callout-tip{background:rgba(34,197,94,.06);border-color:rgba(34,197,94,.2)}
.callout-warn{background:rgba(249,115,22,.06);border-color:rgba(249,115,22,.2)}
.callout b{display:block;margin-bottom:4px}
.callout p{margin-bottom:0}

/* Comparison table */
.content table{
  width:100%;border-collapse:collapse;margin:20px 0;font-size:.88rem
}
.content th,.content td{
  padding:12px 16px;text-align:left;border-bottom:1px solid var(--border)
}
.content th{font-weight:600;background:var(--bg-card);font-size:.82rem;color:var(--text-secondary)}
.content tr:hover{background:var(--bg-card)}

/* Mobile table scroll wrapper */
.table-wrap{overflow-x:auto;margin:20px 0;border-radius:12px;border:1px solid var(--border)}
.table-wrap table{margin:0;border-radius:0}
.table-wrap th:first-child,.table-wrap td:first-child{position:sticky;left:0;background:var(--bg);z-index:1}

/* Series navigation */
.series-nav{
  margin:48px 0 0;padding:28px 24px;background:var(--bg-card);
  border:1px solid var(--border);border-radius:var(--radius)
}
.series-nav h4{font-size:.88rem;font-weight:700;margin-bottom:16px;color:var(--text-secondary)}
.series-nav ul{list-style:none;padding:0}
.series-nav li{margin-bottom:8px}
.series-nav a{
  display:flex;align-items:center;gap:8px;text-decoration:none;
  color:var(--text-secondary);font-size:.88rem;padding:8px 12px;
  border-radius:8px;transition:all .2s
}
.series-nav a:hover{background:var(--bg-card-hover);color:var(--text)}
.series-nav a.current{color:var(--accent-green);font-weight:600;background:rgba(34,197,94,.06)}
.series-nav .num{
  display:inline-flex;align-items:center;justify-content:center;
  width:24px;height:24px;border-radius:6px;font-size:.72rem;font-weight:700;
  background:var(--border);color:var(--text-secondary);flex-shrink:0
}
.series-nav a.current .num{background:rgba(34,197,94,.15);color:var(--accent-green)}

/* ─── Footer (same as homepage) ─── */
footer{
  border-top:1px solid var(--border);padding:48px 24px 40px;text-align:center;
  color:var(--text-secondary);transition:border-color .3s;background:var(--bg)
}
.footer-inner{max-width:600px;margin:0 auto}
.footer-brand{font-size:1.1rem;font-weight:700;color:var(--text);margin-bottom:20px}
.footer-links{
  display:flex;justify-content:center;gap:24px;margin-bottom:20px;flex-wrap:wrap
}
.footer-links a{
  display:inline-flex;align-items:center;gap:6px;
  text-decoration:none;color:var(--text-secondary);font-size:.88rem;
  font-weight:500;transition:color .2s;min-height:44px
}
.footer-links a:hover{color:var(--accent-green)}
.footer-copy{font-size:.8rem;color:var(--text-muted)}

/* ─── Responsive ─── */
@media(max-width:1024px){
  .nav-links{gap:18px}
  .nav-links a{font-size:.85rem}
  .article-layout{padding-left:240px}
}

@media(max-width:768px){
  .nav-links{display:none}
  .hamburger{display:flex}
  .toc{display:none}
  .article-layout{padding:80px 20px 48px}
  .article-meta h1{font-size:1.6rem}
  .article-meta .subtitle{font-size:.95rem}
  .content h2{font-size:1.25rem;margin:36px 0 14px;padding-top:20px}
  .content h3{font-size:1.05rem;margin:24px 0 10px}
  .content p{font-size:.95rem;line-height:1.85}
  .content pre{padding:16px;font-size:.8rem;border-radius:8px}
  .callout{padding:16px 18px;border-radius:8px}
  .series-nav{padding:22px 18px;border-radius:12px}
  .footer-links{gap:16px}
}

@media(max-width:480px){
  .article-layout{padding:76px 16px 40px}
  .article-meta h1{font-size:1.4rem;letter-spacing:-.5px}
  .article-meta .info{gap:10px}
  .content h2{font-size:1.15rem}
  .content p{font-size:.9rem}
  .content pre{padding:14px 12px;font-size:.78rem}
  .table-wrap{font-size:.82rem}
  .series-nav a{font-size:.84rem;padding:6px 10px}
  .footer-links{flex-direction:column;gap:8px}
  footer{padding:36px 16px 32px}
}
</style>
</head>

<script>
function toggleTheme(){
  var d=document.documentElement;
  var next=d.getAttribute('data-theme')==='dark'?'light':'dark';
  d.setAttribute('data-theme',next);
  localStorage.setItem('theme',next);
  document.querySelector('.theme-btn').textContent=next==='dark'?'☀️':'🌙';
}
(function(){
  var saved=localStorage.getItem('theme')||
    (matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');
  if(saved==='dark'){
    document.documentElement.setAttribute('data-theme','dark');
    document.querySelector('.theme-btn').textContent='☀️';
  }
})();
function toggleMenu(){
  var btn=document.querySelector('.hamburger');
  var menu=document.getElementById('mobile-menu');
  btn.classList.toggle('active');
  menu.classList.toggle('show');
}
document.querySelectorAll('.mobile-menu a').forEach(function(a){
  a.addEventListener('click',function(){
    if(!this.getAttribute('onclick')){
      document.querySelector('.hamburger').classList.remove('active');
      document.getElementById('mobile-menu').classList.remove('show');
    }
  });
});
/* TOC scroll spy */
var tocLinks=document.querySelectorAll('.toc a');
var headings=[];
tocLinks.forEach(function(a){
  var id=a.getAttribute('href');
  if(id && id.startsWith('#')){
    var el=document.getElementById(id.slice(1));
    if(el)headings.push({el:el,a:a});
  }
});
window.addEventListener('scroll',function(){
  var scrollY=window.pageYOffset+120;
  var current=null;
  headings.forEach(function(h){if(h.el.offsetTop<=scrollY)current=h;});
  tocLinks.forEach(function(a){a.classList.remove('active');});
  if(current)current.a.classList.add('active');
});
</script>
